{% extends 'base.html' %}

{% block title %}Edit Expense{% endblock %}

{% block content %}

<div class="container py-4">

    <div class="card shadow border-0">

        <div class="card-header bg-warning text-dark">

            <h4 class="mb-0">
                Edit Expense
            </h4>

        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                {{ form.as_p }}

                <button
                    type="submit"
                    class="btn btn-warning">

                    Update Expense

                </button>

                <a
                    href="{% url 'expense_list' %}"
                    class="btn btn-secondary">

                    Cancel

                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
